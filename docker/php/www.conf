; ─── PHP-FPM Worker Pool Tuning ────────────────────────────
; Loaded after defaults via zzz- prefix naming

[global]
; CRITICAL: Must stay foreground so Docker container doesn't exit
daemonize = no

[www]
; Dynamic process management — scales workers based on load
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.process_idle_timeout = 10s
pm.max_requests = 500

; Timeout for serving a single request (matches Nginx 600s)
request_terminate_timeout = 600

; Log slow requests for debugging (>5s threshold)
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s

; Pass environment variables to PHP workers (needed for DB_HOST, REDIS_HOST, etc.)
clear_env = no
