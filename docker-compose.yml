services:
  # ─── Laravel Application (PHP-FPM) ───────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: depi-devops-app
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=depi_devops
      - DB_USERNAME=yusef
      - DB_PASSWORD=password
      - REDIS_HOST=redis
    volumes:
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage/app/public
    networks:
      - depi-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ─── Nginx Web Server ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: depi-devops-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
    networks:
      - depi-network
    depends_on:
      - app

  # ─── MySQL Database ─────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: depi-devops-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: depi_devops
      MYSQL_USER: yusef
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - depi-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uyusef", "-ppassword"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 45s

  # ─── Redis Cache ────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: depi-devops-redis
    restart: unless-stopped
    networks:
      - depi-network

# ─── Volumes ──────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  app_storage:
    driver: local
  app_public:
    driver: local

# ─── Networks ─────────────────────────────────────────────
networks:
  depi-network:
    driver: bridge
