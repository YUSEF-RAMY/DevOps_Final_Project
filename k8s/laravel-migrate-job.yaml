apiVersion: batch/v1
kind: Job
metadata:
  name: laravel-migration-job
spec:
  template:
    spec:
      containers:
      - name: migration
        image: depi-devops-app:latest
        imagePullPolicy: IfNotPresent
        command: ["php", "artisan", "migrate", "--force"]
        env:
        - name: DB_HOST
          value: "mysql-service"
        - name: DB_PORT
          value: "3306"
        - name: DB_DATABASE
          value: "depi_devops"
        - name: DB_USERNAME
          value: "yusef"
        - name: DB_PASSWORD
          value: "password"
      restartPolicy: OnFailure
